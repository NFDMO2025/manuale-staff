<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Denuncia Sociale</title>
  <meta name="description" content="Archivio pubblico di prove e clip su decisioni discutibili dello staff.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/denunce.css?v=2">
</head>
<body>
  <div class="noise" aria-hidden="true"></div>

  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <span class="brand-mark">DS</span>
        <div>
          <p class="brand-kicker">Archivio pubblico</p>
          <h1 class="brand-title" id="site-title">Denuncia Sociale</h1>
        </div>
      </div>
      <div class="topbar-actions">
        <input type="search" id="search-input" class="search-input" placeholder="Cerca clip, categoria, file...">
        <button type="button" class="btn btn-ghost" id="btn-reset-filters">Tutte</button>
      </div>
    </div>
  </header>

  <main class="page">
    <section class="hero" id="hero">
      <div class="hero-copy">
        <p class="hero-eyebrow">Prove · Clip · Registrazioni</p>
        <h2 class="hero-title" id="hero-title">Denuncia Sociale</h2>
        <p class="hero-sub" id="hero-sub">Caricamento contenuti...</p>
        <p class="hero-desc" id="hero-desc"></p>
      </div>
      <div class="hero-stats" id="hero-stats"></div>
    </section>

    <section class="category-nav" id="category-nav" aria-label="Categorie"></section>

    <section class="content">
      <div class="content-head">
        <div>
          <p class="content-kicker">Sezione attiva</p>
          <h3 class="content-title" id="active-category-title">Tutte le clip</h3>
          <p class="content-desc" id="active-category-desc">Esplora l'archivio completo.</p>
        </div>
        <p class="content-count" id="result-count"></p>
      </div>

      <div class="clip-grid" id="clip-grid"></div>
      <div class="empty-state hidden" id="empty-state">
        <h4>Nessuna clip trovata</h4>
        <p>Prova un'altra categoria o modifica la ricerca.</p>
      </div>
    </section>

    <footer class="footer">
      <p id="site-disclaimer">Contenuti derivati dalla cartella Video.</p>
      <p class="footer-meta" id="generated-at"></p>
    </footer>
  </main>

  <div class="modal-backdrop hidden" id="video-modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal">
      <button type="button" class="modal-close" id="modal-close" aria-label="Chiudi">×</button>
      <div class="modal-head">
        <p class="modal-kicker" id="modal-category"></p>
        <h3 class="modal-title" id="modal-title"></h3>
        <p class="modal-meta" id="modal-meta"></p>
      </div>
      <div class="modal-player-wrap">
        <video id="modal-video" class="modal-video" controls playsinline preload="metadata"></video>
        <img id="modal-image" class="modal-image hidden" alt="">
      </div>
      <div class="modal-foot">
        <p class="modal-description" id="modal-description"></p>
        <p class="modal-file" id="modal-file"></p>
      </div>
    </div>
  </div>

  <div class="toast hidden" id="toast"></div>

  <script src="js/denunce-app.js?v=2"></script>
</body>
</html>
